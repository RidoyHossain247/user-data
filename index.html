<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Registration</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      /* display: flex; */
      /* justify-content: center; */
      /* align-items: center; */
      /* height: 100vh; */
      margin: 0;
    }

    .container {
      background: white;
      padding: 24px;
      border-radius: 10px;
      width: 100%;
      /* max-width: 600px; */
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    label {
      font-weight: bold;
      font-size: 14px;
    }

    .success {
      text-align: center;
      font-size: 18px;
      color: green;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>User Registration</h2>

    <div class="success" id="successMsg">
      ✅ তোমার রেজিস্ট্রেশন সফল হয়েছে!
    </div>

    <form id="form">
      <label>Name</label>
      <input type="text" name="name" required />

      <label>Father Name</label>
      <input type="text" name="fatherName" required />

      <label>Mother Name</label>
      <input type="text" name="motherName" />

      <label>Date of Birth</label>
      <input type="date" name="dateOfBirth" />

      <label>Gender</label>
      <select name="gender">
        <option value="">Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>

      <label>Present Address</label>
      <input type="text" name="presentAddress" />

      <label>Permanent Address</label>
      <input type="text" name="permanentAddress" />

      <label>Country</label>
      <input type="text" name="currentCountry" />

      <label>Mobile Number</label>
      <input type="text" name="mobileNumber" />

      <label>Email</label>
      <input type="email" name="email" />

      <label>Monthly Fee</label>
      <input type="number" name="monthlyFee" />

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("form");
    const successMsg = document.getElementById("successMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      // number fix
      data.monthlyFee = Number(data.monthlyFee);

      console.log("Form Data:", data);

      try {
        const res = await fetch("https://foundation-backend-l6hb.onrender.com/api/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          successMsg.style.display = "block";
          form.reset();
        } else {
          alert("Registration failed ❌");
        }

      } catch (error) {
        console.error(error);
        alert("Error occurred ❌");
      }
    });
  </script>
</body>
</html>
